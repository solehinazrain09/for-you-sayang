<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Access</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: black;
    color: #00ffcc;
    overflow: hidden;
}

/* Loading */
#loading {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
}

/* Login */
#login {
    display: none;
    text-align: center;
    margin-top: 100px;
}

input {
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 20px;
    border: none;
    background: #00ffcc;
    cursor: pointer;
    border-radius: 5px;
}

/* Main Card */
#main {
    display: none;
    text-align: center;
    padding: 20px;
}

.card {
    background: white;
    color: black;
    padding: 25px;
    border-radius: 15px;
    max-width: 400px;
    margin: auto;
}

.success {
    display: none;
    color: green;
    margin-top: 10px;
}

/* Heart */
.heart {
    position: absolute;
    color: red;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    0% {transform: translateY(-10vh);}
    100% {transform: translateY(110vh);}
}

/* Confetti */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: yellow;
    animation: fall 3s linear infinite;
}
</style>
</head>

<body>

<!-- SOUND -->
<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

<div id="loading">Initializing system... 💻</div>

<div id="login">
    <h2>🔐 Secure Login Required</h2>
    <p>Enter password to continue</p>
    <input type="password" id="pass" placeholder="Password">
    <br>
    <button onclick="login()">Access</button>
</div>

<div id="main">
    <div class="card">
        <h2>💖 Dating Request</h2>
        <p id="typing"></p>
        <button onclick="approve()">Approve ✅</button>
        <div class="success" id="ok">Permohonan anda diterima ❤️</div>
    </div>
</div>

<script>
// loading
setTimeout(() => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("login").style.display = "block";
}, 2000);

// login
function login() {
    let p = document.getElementById("pass").value;
    if (p === "sayang") {
        document.getElementById("login").style.display = "none";
        document.getElementById("main").style.display = "block";
        document.getElementById("music").play();
        typing();
    } else {
        alert("Access Denied ❌");
    }
}

// typing effect
let text = "Hi sayang... nak ajak dating petang ni 😄 Durian + Cikung mission 🍈🍊";
let i = 0;
function typing() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 40);
    }
}

// approve
function approve() {
    document.getElementById("ok").style.display = "block";

    // hearts + confetti
    for (let i = 0; i < 30; i++) {
        let h = document.createElement("div");
        h.className = "heart";
        h.innerHTML = "❤️";
        h.style.left = Math.random()*100 + "vw";
        document.body.appendChild(h);

        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random()*100 + "vw";
        document.body.appendChild(c);

        setTimeout(()=>{h.remove(); c.remove();},3000);
    }

    setTimeout(()=>{
        let msg = encodeURIComponent("Permohonan dating diluluskan 😄❤️");
        window.location.href = "https://wa.me/60134503423?text=" + msg;
    },2000);
}
</script>

</body>
</html>
